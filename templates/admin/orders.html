{% extends 'base.html' %}

{% block content %}

<h1>
    All Orders
</h1>

<table border="1"
style="width:100%;
text-align:center;">

<tr>

    <th>
        Order ID
    </th>

    <th>
        Customer
    </th>

    <th>
        Total Price
    </th>

    <th>
        Address
    </th>

    <th>
        Payment
    </th>

    <th>
        Date
    </th>

</tr>

{% for order in orders %}

<tr>

    <td>
        {{ order[0] }}
    </td>

    <td>
        {{ order[1] }}
    </td>

    <td>
        ₹{{ order[2] }}
    </td>

    <td>
        {{ order[3] }}
    </td>

    <td>
        {{ order[4] }}
    </td>

    <td>
        {{ order[5] }}
    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
